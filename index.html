<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DIRECT | PROTOCOL LOCK</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f3ff;
            --deep-black: #000000;
            --danger-red: #ff3b3b;
            --disabled-grey: #444;
        }

        html, body {
            background-color: var(--deep-black);
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            overflow: hidden; 
            font-family: 'Orbitron', sans-serif;
            color: white;
        }

        .main-wrapper {
            display: flex;
            flex-direction: column;
            height: 100dvh;
            padding: 10px;
            box-sizing: border-box;
        }

        .box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(0, 243, 255, 0.1);
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 8px;
            flex-shrink: 0;
        }

        .box-title {
            color: var(--neon-blue);
            font-size: 0.6rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .coords-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            text-align: center;
        }

        .needle-area {
            flex-grow: 1; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 150px;
        }

        .needle-container {
            width: 150px; height: 150px;
            position: relative;
            display: flex; justify-content: center; align-items: center;
        }

        .needle-pointer {
            width: 0; height: 0;
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-bottom: 70px solid var(--neon-blue);
            position: absolute;
            bottom: 50%;
            transform-origin: bottom center;
            filter: drop-shadow(0 0 8px var(--neon-blue));
            transition: transform 0.2s ease-out;
        }

        /* --- Protocol Section Styles --- */
        .protocol-box {
            border: 1px solid var(--disabled-grey);
            background: rgba(255, 255, 255, 0.01);
            transition: 0.4s ease;
        }

        /* Style when active */
        .protocol-box.active {
            border-color: var(--danger-red);
            background: rgba(255, 59, 59, 0.05);
            box-shadow: 0 0 10px rgba(255, 59, 59, 0.1);
        }

        .protocol-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 5px;
        }

        .protocol-input {
            width: 60px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--disabled-grey);
            color: var(--disabled-grey);
            font-family: 'Orbitron';
            font-size: 1rem;
            text-align: center;
            border-radius: 4px;
            outline: none;
            transition: 0.3s;
        }

        /* Input style when active */
        .protocol-input.active {
            border-color: var(--danger-red);
            color: var(--danger-red);
            box-shadow: 0 0 5px var(--danger-red);
        }

        /* Switch UI */
        .switch { position: relative; display: inline-block; width: 44px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #333; transition: .4s; border-radius: 20px;
        }
        .slider:before {
            position: absolute; content: ""; height: 16px; width: 16px;
            left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--danger-red); }
        input:checked + .slider:before { transform: translateX(22px); }

    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="box" style="text-align:center;">
        <div class="box-title">Subject ID</div>
        <div id="targetName">TARGET_ALPHA</div>
    </div>

    <div class="box">
        <div class="box-title">Spatial Data (X, Y, Z)</div>
        <div class="coords-grid">
            <div><span style="color:var(--neon-blue); font-size:0.6rem;">X</span><br><span>0.00</span></div>
            <div><span style="color:var(--neon-blue); font-size:0.6rem;">Y</span><br><span>0.00</span></div>
            <div><span style="color:var(--neon-blue); font-size:0.6rem;">Z</span><br><span>0.0</span></div>
        </div>
    </div>

    <div class="needle-area">
        <div class="needle-container">
            <div id="ptr" class="needle-pointer"></div>
        </div>
    </div>

    <div class="box protocol-box" id="pBox">
        <div class="box-title" id="pTitle" style="color:var(--disabled-grey);">Protocol Alpha</div>
        <div class="protocol-controls">
            <div>
                <input type="number" id="alertM" class="protocol-input" value="20" disabled>
                <span id="pUnit" style="font-size: 0.6rem; color: var(--disabled-grey);"> MTR</span>
            </div>
            <label class="switch">
                <input type="checkbox" id="toggleProtocol" onchange="toggleProtocolState()">
                <span class="slider"></span>
            </label>
        </div>
    </div>
</div>

<script>
    function toggleProtocolState() {
        const isChecked = document.getElementById('toggleProtocol').checked;
        const input = document.getElementById('alertM');
        const box = document.getElementById('pBox');
        const title = document.getElementById('pTitle');
        const unit = document.getElementById('pUnit');

        if (isChecked) {
            // Enable State
            input.disabled = false;
            input.classList.add('active');
            box.classList.add('active');
            title.style.color = "var(--danger-red)";
            unit.style.color = "var(--danger-red)";
        } else {
            // Disable State
            input.disabled = true;
            input.classList.remove('active');
            box.classList.remove('active');
            title.style.color = "var(--disabled-grey)";
            unit.style.color = "var(--disabled-grey)";
        }
    }

    // Small animation for needle
    const ptr = document.getElementById('ptr');
    let r = 0;
    setInterval(() => { r += 1; ptr.style.transform = `rotate(${r}deg)`; }, 50);
</script>

</body>
</html>
