<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DIRECT | 3D TRACE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f3ff;
            --deep-black: #000000;
            --danger-red: #ff3b3b;
        }

        body {
            background-color: var(--deep-black);
            color: white;
            font-family: 'Orbitron', sans-serif;
            margin: 0; padding: 10px;
            display: flex; flex-direction: column;
            height: 100vh; box-sizing: border-box;
            overflow: hidden;
        }

        .box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(0, 243, 255, 0.1);
            border-radius: 12px;
            padding: 12px; margin-bottom: 8px;
        }

        .box-title {
            color: var(--neon-blue);
            font-size: 0.6rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        /* X, Y, Z Coordinate Layout */
        .coords-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            text-align: center;
        }
        .coord-label { color: var(--neon-blue); font-size: 0.7rem; }
        .coord-val { font-size: 1rem; display: block; }

        /* Needle with Pointer */
        .needle-area {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .needle-container {
            width: 200px;
            height: 200px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* The Pointer Needle */
        .needle-pointer {
            width: 0;
            height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-bottom: 100px solid var(--neon-blue); /* The "Pointer" part */
            position: absolute;
            bottom: 50%; /* Pivot point is at the center of the area */
            transform-origin: bottom center;
            filter: drop-shadow(0 0 10px var(--neon-blue));
            transition: transform 0.2s ease-out;
        }

        /* Center Hub */
        .needle-hub {
            width: 10px;
            height: 10px;
            background: white;
            border-radius: 50%;
            z-index: 2;
            box-shadow: 0 0 10px white;
        }

        /* Protocol Alert Controls */
        .protocol-box { border-color: var(--danger-red); background: rgba(255, 59, 59, 0.03); }
        .protocol-box .box-title { color: var(--danger-red); }
        .protocol-controls { display: flex; align-items: center; justify-content: space-between; }
        .protocol-input {
            width: 60px; background: transparent; border: 1px solid var(--danger-red);
            color: var(--danger-red); font-family: 'Orbitron'; font-size: 1.1rem;
            text-align: center; border-radius: 4px; outline: none;
        }

        /* Switch UI */
        .switch { position: relative; display: inline-block; width: 44px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #222; transition: .4s; border-radius: 20px;
        }
        .slider:before {
            position: absolute; content: ""; height: 16px; width: 16px;
            left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--danger-red); box-shadow: 0 0 10px var(--danger-red); }
        input:checked + .slider:before { transform: translateX(22px); }
    </style>
</head>
<body>

    <div class="box" style="text-align:center;">
        <div class="box-title">Tracking Active</div>
        <div id="targetName" style="font-size: 1.4rem; text-shadow: 0 0 10px var(--neon-blue);">...</div>
    </div>

    <div class="box">
        <div class="box-title">Spatial Telemetry</div>
        <div class="coords-grid">
            <div><span class="coord-label">X (LAT)</span><span class="coord-val" id="valX">0.0000</span></div>
            <div><span class="coord-label">Y (LNG)</span><span class="coord-val" id="valY">0.0000</span></div>
            <div><span class="coord-label">Z (ALT)</span><span class="coord-val" id="valZ">0.0 m</span></div>
        </div>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
        <div class="box"><div class="box-title">Distance</div><div id="mDist">0 m</div></div>
        <div class="box"><div class="box-title">Steps</div><div id="sCount">0</div></div>
    </div>

    <div class="needle-area">
        <div class="box-title" style="position:absolute; top: 20px;">Directional Vector</div>
        <div class="needle-container">
            <div id="ptr" class="needle-pointer"></div>
            <div class="needle-hub"></div>
        </div>
    </div>

    <div class="box protocol-box">
        <div class="box-title">Distance Protocol (20m Default)</div>
        <div class="protocol-controls">
            <div>
                <input type="number" id="alertMeters" class="protocol-input" value="20">
                <span style="font-size: 0.7rem; color: var(--danger-red);"> METERS</span>
            </div>
            <label class="switch">
                <input type="checkbox" id="dongleSwitch">
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <script>
        // Load data from login
        document.getElementById('targetName').innerText = localStorage.getItem("childName") || "TARGET_ALPHA";

        // Needle Logic
        const ptr = document.getElementById('ptr');
        let angle = 0;
        
        // Mocking live data rotation
        setInterval(() => {
            angle += (Math.random() * 10 - 5); // Simulate slight jitter
            ptr.style.transform = `rotate(${angle}deg)`;
        }, 200);
    </script>
</body>
