<div class="box protocol-box" id="pContainer">
    <div class="box-title" id="pLabel" style="color:var(--disabled)">Distance Protocol</div>
    <div class="controls">
        <div>
            <input type="number" id="mInput" value="20" min="0" disabled oninput="checkNegative(this)">
            <small id="mUnit" style="color:var(--disabled); margin-left:5px;">MTR</small>
        </div>
        <label class="switch">
            <input type="checkbox" id="pSwitch" onchange="updateProtocol()">
            <span class="slider"></span>
        </label>
    </div>
</div>

<script>
    // --- FIX: Prevent Minus Points ---
    function checkNegative(input) {
        if (input.value < 0) {
            input.value = 0; // Force it to 0 if they try to go lower
        }
    }

    function updateProtocol() {
        const active = document.getElementById('pSwitch').checked;
        const input = document.getElementById('mInput');
        const container = document.getElementById('pContainer');
        const label = document.getElementById('pLabel');
        const unit = document.getElementById('mUnit');

        if(active) {
            input.disabled = false;
            input.classList.add('active');
            container.classList.add('active');
            label.style.color = "var(--danger-red)";
            unit.style.color = "var(--danger-red)";
        } else {
            input.disabled = true;
            input.classList.remove('active');
            container.classList.remove('active');
            label.style.color = "var(--disabled)";
            unit.style.color = "var(--disabled)";
            
            // Optional: Reset to default if turned off
            if(input.value < 0) input.value = 20; 
        }
    }

    // --- YOUR GPS ALERT LOGIC ---
    // This part runs in your main loop to check for the alert
    setInterval(() => {
        let currentDist = 25; // Example real-time distance
        let alertLimit = document.getElementById('mInput').value;
        let isProtocolOn = document.getElementById('pSwitch').checked;

        // If Protocol is ON and tracker is further than the limit
        if (isProtocolOn && currentDist > alertLimit) {
            // Trigger a visual alert (Screen flashes Red)
            document.body.style.backgroundColor = "#200"; 
            console.log("ALERT: Out of Range!");
        } else {
            document.body.style.backgroundColor = "black";
        }
    }, 1000);
</script>
