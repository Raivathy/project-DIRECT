<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DIRECT | SYSTEM ACTIVE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f3ff;
            --deep-black: #000000;
            --danger-red: #ff3b3b;
            --disabled: #444;
        }

        html, body {
            background-color: var(--deep-black);
            margin: 0; padding: 0;
            height: 100dvh; width: 100%;
            overflow: hidden; 
            font-family: 'Orbitron', sans-serif;
            color: white;
        }

        .main-wrapper {
            display: flex;
            flex-direction: column;
            height: 100%;
            padding: 15px;
            box-sizing: border-box;
        }

        .box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 243, 255, 0.1);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 10px;
            flex-shrink: 0;
        }

        .box-title {
            color: var(--neon-blue);
            font-size: 0.65rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        /* X, Y, Z Grid */
        .coords-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            text-align: center;
            gap: 5px;
        }
        .coord-item span { font-size: 0.9rem; }
        .coord-label { color: var(--neon-blue); font-size: 0.6rem; display: block; }

        /* Meters and Steps */
        .split-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 10px;
            flex-shrink: 0;
        }

        /* Pointer Needle */
        .needle-area {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .pointer {
            width: 0; height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-bottom: 100px solid var(--neon-blue);
            filter: drop-shadow(0 0 12px var(--neon-blue));
            transform-origin: bottom center;
            transition: transform 0.3s ease-out;
        }

        /* Protocol Alert Box */
        .protocol-box {
            border: 1px solid var(--disabled);
            background: rgba(255, 255, 255, 0.01);
            transition: 0.3s ease;
        }
        .protocol-box.active {
            border-color: var(--danger-red);
            background: rgba(255, 59, 59, 0.05);
            box-shadow: 0 0 15px rgba(255, 59, 59, 0.1);
        }

        .controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        input[type="number"] {
            width: 80px;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--disabled);
            color: var(--disabled);
            font-family: 'Orbitron';
            font-size: 1.2rem;
            text-align: center;
            border-radius: 6px;
            outline: none;
            padding: 5px;
        }

        input[type="number"].active {
            border-color: var(--danger-red);
            color: var(--danger-red);
            text-shadow: 0 0 5px var(--danger-red);
        }

        /* Toggle Switch */
        .switch { position: relative; width: 48px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #222; transition: .4s; border-radius: 20px;
        }
        .slider:before {
            position: absolute; content: ""; height: 18px; width: 18px;
            left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--danger-red); }
        input:checked + .slider:before { transform: translateX(24px); }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="box" style="text-align: center;">
        <div class="box-title">Tracking Subject</div>
        <div id="uName" style="font-size: 1.2rem; letter-spacing: 2px;">...</div>
    </div>

    <div class="box">
        <div class="box-title">Spatial Data Stream</div>
        <div class="coords-grid">
            <div class="coord-item"><span class="coord-label">X</span><span id="outX">0.000</span></div>
            <div class="coord-item"><span class="coord-label">Y</span><span id="outY">0.000</span></div>
            <div class="coord-item"><span class="coord-label">Z</span><span id="outZ">0.0m</span></div>
        </div>
    </div>

    <div class="split-row">
        <div class="box" style="margin-bottom:0;">
            <div class="box-title">Distance</div>
            <span style="font-size: 1.3rem;"><span id="displayM">0</span> m</span>
        </div>
        <div class="box" style="margin-bottom:0;">
            <div class="box-title">Step Count</div>
            <span style="font-size: 1.3rem;" id="displayS">0</span>
        </div>
    </div>

    <div class="needle-area">
        <div id="ptr" class="pointer"></div>
    </div>

    <div class="box protocol-box" id="pBox">
        <div class="box-title" id="pLabel" style="color:var(--disabled)">Distance Protocol</div>
        <div class="controls">
            <div>
                <input type="number" id="pInput" value="20" min="0" oninput="if(this.value < 0) this.value = 0;" disabled>
                <small id="pUnit" style="color:var(--disabled); margin-left:5px;">MTR</small>
            </div>
            <label class="switch">
                <input type="checkbox" id="pToggle" onchange="handleProtocol()">
                <span class="slider"></span>
            </label>
        </div>
    </div>
</div>

<script>
    // Load Name from Login Page
    document.getElementById('uName').innerText = localStorage.getItem("childName") || "TARGET_ACTIVE";

    // Protocol Logic: Disable/Enable Input
    function handleProtocol() {
        const isOn = document.getElementById('pToggle').checked;
        const input = document.getElementById('pInput');
        const box = document.getElementById('pBox');
        const label = document.getElementById('pLabel');
        const unit = document.getElementById('pUnit');

        if(isOn) {
            input.disabled = false;
            input.classList.add('active');
            box.classList.add('active');
            label.style.color = "var(--danger-red)";
            unit.style.color = "var(--danger-red)";
        } else {
            input.disabled = true;
            input.classList.remove('active');
            box.classList.remove('active');
            label.style.color = "var(--disabled)";
            unit.style.color = "var(--disabled)";
        }
    }

    // Pointer & Data Simulation (Mocking ESP32 behavior)
    const needle = document.getElementById('ptr');
    let mockDistance = 20;

    setInterval(() => {
        // Randomly jitter the needle to simulate live data
        let rotation = Math.random() * 360; 
        needle.style.transform = `rotate(${rotation}deg)`;

        // Update Distance and Auto-calculate steps
        mockDistance = (Math.random() * 50).toFixed(1);
        document.getElementById('displayM').innerText = mockDistance;
        document.getElementById('displayS').innerText = Math.round(mockDistance / 0.75);

        // Update X, Y, Z Mock Values
        document.getElementById('outX').innerText = (13.0 + Math.random()).toFixed(4);
        document.getElementById('outY').innerText = (80.2 + Math.random()).toFixed(4);
        document.getElementById('outZ').innerText = (Math.random() * 5).toFixed(1) + "m";
        
    }, 2000);
</script>

</body>
</html>
