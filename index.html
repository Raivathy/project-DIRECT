<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DIRECT | FIXED UI</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f3ff;
            --deep-black: #000000;
            --danger-red: #ff3b3b;
        }

        /* Prevent the whole page from bouncing or scrolling away */
        html, body {
            background-color: var(--deep-black);
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            overflow: hidden; 
            font-family: 'Orbitron', sans-serif;
            color: white;
        }

        .main-wrapper {
            display: flex;
            flex-direction: column;
            height: 100dvh; /* Use Dynamic Viewport Height for mobile */
            padding: 10px;
            box-sizing: border-box;
        }

        .box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(0, 243, 255, 0.1);
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 8px;
            flex-shrink: 0; /* Prevents boxes from squishing */
        }

        .box-title {
            color: var(--neon-blue);
            font-size: 0.6rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .coords-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            text-align: center;
        }

        /* The Visual Area - This will shrink if the screen is small */
        .needle-area {
            flex-grow: 1; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 150px;
            position: relative;
        }

        .needle-container {
            width: 150px;
            height: 150px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .needle-pointer {
            width: 0; height: 0;
            border-left: 6px solid transparent;
            border-right: 6px solid transparent;
            border-bottom: 70px solid var(--neon-blue);
            position: absolute;
            bottom: 50%;
            transform-origin: bottom center;
            filter: drop-shadow(0 0 8px var(--neon-blue));
        }

        .needle-hub {
            width: 8px; height: 8px;
            background: white; border-radius: 50%;
            z-index: 2; box-shadow: 0 0 8px white;
        }

        /* Protocol Box - FIXED at the bottom */
        .protocol-box {
            border: 1px solid var(--danger-red);
            background: rgba(255, 59, 59, 0.05);
            margin-bottom: 5px; /* Stay above the safe area */
        }

        .protocol-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 5px;
        }

        .protocol-input {
            width: 50px;
            background: transparent;
            border: 1px solid var(--danger-red);
            color: var(--danger-red);
            font-family: 'Orbitron';
            font-size: 1rem;
            text-align: center;
            border-radius: 4px;
        }

        /* Mobile Switch */
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #222; transition: .4s; border-radius: 20px;
        }
        .slider:before {
            position: absolute; content: ""; height: 14px; width: 14px;
            left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--danger-red); }
        input:checked + .slider:before { transform: translateX(20px); }

    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="box" style="text-align:center;">
        <div class="box-title">Subject Trace</div>
        <div id="targetName" style="color:white; font-size: 1.1rem;">TARGET_ALPHA</div>
    </div>

    <div class="box">
        <div class="box-title">Spatial Data</div>
        <div class="coords-grid">
            <div><span style="color:var(--neon-blue); font-size:0.6rem;">X</span><br><span id="x">0.00</span></div>
            <div><span style="color:var(--neon-blue); font-size:0.6rem;">Y</span><br><span id="y">0.00</span></div>
            <div><span style="color:var(--neon-blue); font-size:0.6rem;">Z</span><br><span id="z">0.0m</span></div>
        </div>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
        <div class="box"><div class="box-title">Dist</div><span id="d">0 m</span></div>
        <div class="box"><div class="box-title">Steps</div><span id="s">0</span></div>
    </div>

    <div class="needle-area">
        <div class="needle-container">
            <div id="ptr" class="needle-pointer"></div>
            <div class="needle-hub"></div>
        </div>
    </div>

    <div class="box protocol-box">
        <div class="box-title" style="color:var(--danger-red);">Distance Protocol</div>
        <div class="protocol-controls">
            <div>
                <input type="number" id="alertM" class="protocol-input" value="20">
                <span style="font-size: 0.6rem; color: var(--danger-red);"> MTR</span>
            </div>
            <label class="switch">
                <input type="checkbox" id="toggle">
                <span class="slider"></span>
            </label>
        </div>
    </div>
</div>

<script>
    // Just a bit of movement to show it's working
    const ptr = document.getElementById('ptr');
    let r = 0;
    setInterval(() => {
        r += 1;
        ptr.style.transform = `rotate(${r}deg)`;
    }, 50);
</script>

</body>
</html>
